name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout (full history for blame-based coverage)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Skip if SonarQube host not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL variable not set — skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@8c71dc039c2dd71d3821e89a2b58ecc7fee6ced9 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=yolo-labz_portfolio
            -Dsonar.projectName=portfolio
            -Dsonar.sources=apps,packages,projects,scripts
            -Dsonar.tests=apps,packages,projects
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.test.mjs
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/.turbo/**,**/dist/**,**/build/**,**/coverage/**,**/.specify/**,**/public/**,**/*.tsbuildinfo,**/next-env.d.ts,**/data/**,**/test-results/**,**/playwright-report/**,**/*.spec.ts-snapshots/**
            -Dsonar.typescript.tsconfigPath=tsconfig.base.json
            -Dsonar.sourceEncoding=UTF-8
