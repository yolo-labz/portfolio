name: Collect Executive Jobs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: projects/exec-job-board

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: projects/exec-job-board/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          THEMUSE_API_KEY: ${{ secrets.THEMUSE_API_KEY }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
        run: python -m collector.main

      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet data/jobs.json 2>/dev/null && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git commit -m "data: update executive job listings $(date -u +%Y-%m-%d)"
          git push

  deploy:
    runs-on: self-hosted
    needs: collect
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Deploy to Dokku
        uses: dokku/github-action@master
        with:
          git_remote_url: "ssh://dokku@192.168.1.184:22/exec-job-board"
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          git_push_flags: "--force"
          deploy_docker_image: false
