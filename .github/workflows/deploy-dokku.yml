name: Deploy to Dokku

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "Dockerfile.dokku"
  workflow_dispatch:

concurrency:
  group: deploy-dokku
  cancel-in-progress: false

env:
  DOKKU_HOST: 192.168.1.184
  DOKKU_APP: portfolio
  SITE_DOMAIN: portfolio.home301server.com.br

permissions: {}

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Deploy to Dokku
        uses: dokku/github-action@cc7dec1d2b9fed249a14ae462bc953bba436f78c # v1.10.0
        with:
          git_remote_url: "ssh://dokku@192.168.1.184:22/portfolio"
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          # The action defaults `branch` to "master"; this app's Dokku
          # deploy-branch is "main" (verified via `dokku git:report portfolio`).
          # Without this, the action pushes HEAD:refs/heads/master, Dokku stores
          # the ref but does NOT rebuild, emitting "WARNING: deploy did not
          # complete, you must push to main" — a silent no-op deploy.
          branch: "main"
          git_push_flags: "--force"

  verify:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Assert the live container is serving this commit
        env:
          HEALTH_URL: https://portfolio.home301server.com.br/api/health
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          echo "Expecting /api/health to report rev == ${EXPECTED_SHA}"
          REV=""
          for attempt in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 15 "$HEALTH_URL" 2>/dev/null || echo '{}')
            STATUS=$(printf '%s' "$BODY" | sed -n 's/.*"status"[ :]*"\([^"]*\)".*/\1/p')
            REV=$(printf '%s' "$BODY" | sed -n 's/.*"rev"[ :]*"\([^"]*\)".*/\1/p')
            echo "attempt ${attempt}/12: status=${STATUS:-none} rev=${REV:-none}"
            if [ "$STATUS" = "healthy" ] && [ "$REV" = "$EXPECTED_SHA" ]; then
              echo "Verified: live container is serving ${EXPECTED_SHA}"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Deploy verification FAILED: /api/health did not report rev=${EXPECTED_SHA} after 12 attempts (live rev='${REV:-none}')."
          echo "::error::Container was not swapped to this commit — likely a no-op deploy or deploy-branch mismatch."
          exit 1
