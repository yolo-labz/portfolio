# Visual-regression CI — Playwright `toHaveScreenshot` against the built
# Next.js @portfolio/web app. Layer 3 of META-PLATFORM-PLAN-2026Q2.md and
# Next.js variant of phsb5321/blog PR #28.
#
# Job runs inside the official Playwright Docker image
# (mcr.microsoft.com/playwright:v1.59.1-noble) so font/freetype/harfbuzz
# versions are byte-stable across local seed runs and CI. Without the
# container, every Ubuntu minor-version bump would invalidate every snapshot.
#
# Workflow security note: SHA-pinned actions per yolo-labz release-engineering
# policy. Workflow-level deny-all `permissions: {}` + per-job re-grant. No
# untrusted github.event.* fields are interpolated into run: blocks (only
# github.run_id, which is server-generated). `persist-credentials: false` on
# checkout — this job never pushes back. Reviewed against
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
name: visual-regression

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "tests/visual/**"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/visual-regression.yml"
  push:
    branches: [main]

permissions: {}

jobs:
  visual-diff:
    name: playwright toHaveScreenshot
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    # Pin Playwright runtime to a specific image for font byte-stability. Bump
    # in lockstep with `@playwright/test` in package.json — image and library
    # MUST share the same version.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.28.2
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install npm deps
        run: pnpm install --frozen-lockfile

      - name: Run visual-regression
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        env:
          RUN_ID: ${{ github.run_id }}
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            test-results/
          retention-days: 14
          if-no-files-found: ignore
