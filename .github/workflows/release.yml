---
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: Build + attest + release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    timeout-minutes: 20
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set SOURCE_DATE_EPOCH for reproducible build
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # No `cache: pnpm` here. Release runs on tag push only; caching adds
          # marginal speed at the cost of a cache-poisoning surface that
          # zizmor flags. SLSA reproducibility relies on the lockfile, not
          # the cache.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @portfolio/web build

      - name: Package release tarball
        run: |
          NAME="portfolio-${TAG_NAME}"
          mkdir -p dist
          tar --sort=name \
              --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -czf "dist/${NAME}.tar.gz" \
              -C apps/web .next public
          ( cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate dual SBOM (CycloneDX 1.7 + SPDX 2.3)
        run: |
          syft . \
            -o cyclonedx-json@1.6=dist/portfolio-sbom.cdx.json \
            -o spdx-json=dist/portfolio-sbom.spdx.json

      - name: Attest build provenance (SLSA L2) for release tarball
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/portfolio-*.tar.gz

      - name: Attest SBOM (CycloneDX) for release tarball
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v2.1.0
        with:
          subject-path: dist/portfolio-*.tar.gz
          sbom-path: dist/portfolio-sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/portfolio-*.tar.gz
            dist/portfolio-*.tar.gz.sha256
            dist/portfolio-sbom.cdx.json
            dist/portfolio-sbom.spdx.json
          generate_release_notes: true
