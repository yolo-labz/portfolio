sonar.projectKey=yolo-labz_portfolio
sonar.projectName=portfolio
sonar.organization=yolo-labz

# Source roots (pnpm + turbo monorepo: apps/*, packages/*, projects/*)
sonar.sources=apps,packages,projects,scripts

# Test inclusions across the monorepo
sonar.tests=apps,packages,projects
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.test.mjs

# Keep the scanner out of build artefacts, vendored deps, generated assets, and infra
sonar.exclusions=**/node_modules/**,**/.next/**,**/.turbo/**,**/dist/**,**/build/**,**/coverage/**,**/.specify/**,**/public/**,**/*.tsbuildinfo,**/next-env.d.ts,**/data/**

# TS + coverage hooks (lcov path is best-effort; skipped if absent)
sonar.typescript.tsconfigPath=tsconfig.base.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info,**/coverage/lcov.info

sonar.sourceEncoding=UTF-8
