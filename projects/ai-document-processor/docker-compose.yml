services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docproc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docproc}
      POSTGRES_DB: ${POSTGRES_DB:-docproc}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docproc}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docproc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docproc}
      POSTGRES_DB: ${POSTGRES_DB:-docproc}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
